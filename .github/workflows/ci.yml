# CI/CD: install deps, Playwright Chromium, collection smoke, optional E2E (GeoManager upload flow).
#
# E2E runs when EITHER pair of secrets is set (trimmed, non-empty):
#   - GM_USERNAME + GM_PASSWORD  (this repo’s convention), OR
#   - VALID_USERNAME + VALID_PASSWORD  (same names as GMloginMFA — reuse without duplicating secrets)
# Optional: GM_OTP_CODE (MFA). GitHub does not allow `secrets` in job-level `if`; E2E is gated via outputs.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install & test collection
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        run: python -m playwright install --with-deps chromium

      - name: Pytest collection smoke
        run: python -m pytest --collect-only -q

  e2e:
    name: E2E (GeoManager login + user upload)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check required secrets
        id: gate
        env:
          S_GM_USER: ${{ secrets.GM_USERNAME }}
          S_GM_PASS: ${{ secrets.GM_PASSWORD }}
          S_VAL_USER: ${{ secrets.VALID_USERNAME }}
          S_VAL_PASS: ${{ secrets.VALID_PASSWORD }}
        run: |
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          U=$(trim "$S_GM_USER")
          [ -z "$U" ] && U=$(trim "$S_VAL_USER")
          P=$(trim "$S_GM_PASS")
          [ -z "$P" ] && P=$(trim "$S_VAL_PASS")
          if [ -n "$U" ] && [ -n "$P" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            {
              echo "## E2E gate"
              echo "Credentials found via **GM_USERNAME** / **GM_PASSWORD** or **VALID_USERNAME** / **VALID_PASSWORD**. Running \`pytest tests/\`."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            {
              echo "## E2E gate — skipped"
              echo "Add **one** of these secret pairs (repository → **Settings** → **Secrets and variables** → **Actions**):"
              echo ""
              echo "| Pair | Secret names |"
              echo "|------|----------------|"
              echo "| A (this repo) | \`GM_USERNAME\`, \`GM_PASSWORD\` |"
              echo "| B (same as GMloginMFA) | \`VALID_USERNAME\`, \`VALID_PASSWORD\` |"
              echo ""
              echo "MFA: set \`GM_OTP_EMAIL\` (Mailinator inbox) + \`MAILINATOR_DOMAIN=public\`, or \`GM_OTP_CODE\`, or IMAP_*."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Full E2E skipped — add repository secrets
        if: steps.gate.outputs.run != 'true'
        run: |
          echo "::notice title=Full test suite not run::Add Actions secrets GM_USERNAME+GM_PASSWORD OR VALID_USERNAME+VALID_PASSWORD; for MFA add GM_OTP_EMAIL or GM_OTP_CODE. See README → CI/CD."
          exit 0

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        if: steps.gate.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Verify upload CSV in workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          ls -la
          if [ ! -f "define_user (1).csv" ]; then
            echo "::error title=Missing CSV::Commit define_user (1).csv at repo root or set GM_UPLOAD_CSV to a checked-in path."
            exit 1
          fi

      - name: Run E2E tests
        if: steps.gate.outputs.run == 'true'
        env:
          CI: "true"
          S_GM_USER: ${{ secrets.GM_USERNAME }}
          S_GM_PASS: ${{ secrets.GM_PASSWORD }}
          S_VAL_USER: ${{ secrets.VALID_USERNAME }}
          S_VAL_PASS: ${{ secrets.VALID_PASSWORD }}
          S_OTP: ${{ secrets.GM_OTP_CODE }}
          S_GM_OTP_EMAIL: ${{ secrets.GM_OTP_EMAIL }}
          S_OTP_EMAIL: ${{ secrets.OTP_EMAIL }}
          PLAYWRIGHT_TIMEOUT_MS: "120000"
          PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: "120000"
        run: |
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          export GM_USERNAME="$(trim "$S_GM_USER")"
          [ -z "$GM_USERNAME" ] && export GM_USERNAME="$(trim "$S_VAL_USER")"
          export GM_PASSWORD="$(trim "$S_GM_PASS")"
          [ -z "$GM_PASSWORD" ] && export GM_PASSWORD="$(trim "$S_VAL_PASS")"
          export GM_OTP_CODE="$(trim "$S_OTP")"
          export GM_OTP_EMAIL="$(trim "$S_GM_OTP_EMAIL")"
          [ -z "$GM_OTP_EMAIL" ] && export GM_OTP_EMAIL="$(trim "$S_OTP_EMAIL")"
          python -m pytest tests/ -v --alluredir=allure-results --tb=short

      - name: E2E passed — job summary
        if: success() && steps.gate.outputs.run == 'true'
        run: |
          echo "## Playwright E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "All tests under \`tests/\` passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Allure results on failure
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-gmmfaupload
          path: allure-results/
          if-no-files-found: ignore
