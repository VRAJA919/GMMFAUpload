# CI/CD: install deps, Playwright Chromium, collection smoke, optional E2E (GeoManager upload flow).
#
# E2E runs when EITHER pair of secrets is set (trimmed, non-empty):
#   - GM_USERNAME + GM_PASSWORD  (this repo’s convention), OR
#   - VALID_USERNAME + VALID_PASSWORD  (same names as GMloginMFA — reuse without duplicating secrets)
# MFA on PROD: E2E also requires GM_OTP_EMAIL, OTP_EMAIL, GM_OTP_CODE, or IMAP_* (see gate step).
# GitHub does not allow `secrets` in job-level `if`; E2E is gated via outputs.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install & test collection
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        run: python -m playwright install --with-deps chromium

      - name: Pytest collection smoke
        run: python -m pytest --collect-only -q

  e2e:
    name: E2E (GeoManager login + user upload)
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check required secrets
        id: gate
        env:
          S_GM_USER: ${{ secrets.GM_USERNAME }}
          S_GM_PASS: ${{ secrets.GM_PASSWORD }}
          S_VAL_USER: ${{ secrets.VALID_USERNAME }}
          S_VAL_PASS: ${{ secrets.VALID_PASSWORD }}
          S_OTP: ${{ secrets.GM_OTP_CODE }}
          S_GM_OTP_EMAIL: ${{ secrets.GM_OTP_EMAIL }}
          S_OTP_EMAIL: ${{ secrets.OTP_EMAIL }}
          S_IMAP_HOST: ${{ secrets.IMAP_HOST }}
          S_IMAP_USER: ${{ secrets.IMAP_USER }}
        run: |
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          U=$(trim "$S_GM_USER")
          [ -z "$U" ] && U=$(trim "$S_VAL_USER")
          P=$(trim "$S_GM_PASS")
          [ -z "$P" ] && P=$(trim "$S_VAL_PASS")
          O=$(trim "$S_OTP")
          E1=$(trim "$S_GM_OTP_EMAIL")
          E2=$(trim "$S_OTP_EMAIL")
          IH=$(trim "$S_IMAP_HOST")
          IU=$(trim "$S_IMAP_USER")

          if [ -z "$U" ] || [ -z "$P" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=credentials" >> "$GITHUB_OUTPUT"
            {
              echo "## E2E gate — skipped (no login credentials)"
              echo "Add **one** of these pairs under **Settings → Secrets and variables → Actions**:"
              echo ""
              echo "| Pair | Secret names |"
              echo "|------|----------------|"
              echo "| A | \`GM_USERNAME\`, \`GM_PASSWORD\` |"
              echo "| B (GMloginMFA names) | \`VALID_USERNAME\`, \`VALID_PASSWORD\` |"
              echo ""
              echo "**PROD GeoManager also requires MFA** — after credentials, add at least one OTP secret (next gate)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          MFA_OK=false
          if [ -n "$O" ]; then MFA_OK=true; fi
          if [ -n "$E1" ] || [ -n "$E2" ]; then MFA_OK=true; fi
          if [ -n "$IH" ] && [ -n "$IU" ]; then MFA_OK=true; fi

          if [ "$MFA_OK" != true ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "reason=mfa" >> "$GITHUB_OUTPUT"
            {
              echo "## E2E gate — skipped (MFA / OTP not configured)"
              echo "Login credentials are set, but **PROD** shows **email MFA** after password. Add **at least one** repository secret:"
              echo ""
              echo "| Secret | Use when |"
              echo "|--------|----------|"
              echo "| \`GM_OTP_EMAIL\` | Recommended — full Mailinator address, e.g. \`you@mailinator.com\` (workflow sets \`MAILINATOR_DOMAIN=public\`) |"
              echo "| \`OTP_EMAIL\` | Same as GMloginMFA — local-part or full address |"
              echo "| \`GM_OTP_CODE\` | Static 6-digit code (short-lived; prefer email secrets) |"
              echo "| \`IMAP_HOST\` + \`IMAP_USER\` | Plus \`IMAP_PASSWORD\` in the E2E step — IMAP OTP fetch |"
              echo ""
              echo "Without one of these, \`pytest\` would fail at MFA with \`RuntimeError\`."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          echo "reason=ok" >> "$GITHUB_OUTPUT"
          {
            echo "## E2E gate"
            echo "Login + MFA/OTP path configured. Running \`pytest tests/\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: E2E skipped — see summary above
        if: steps.gate.outputs.run != 'true'
        run: |
          R="${{ steps.gate.outputs.reason }}"
          if [ "$R" = "mfa" ]; then
            echo "::notice title=MFA secrets required::Add GM_OTP_EMAIL or OTP_EMAIL (Mailinator), or GM_OTP_CODE, or IMAP_HOST+IMAP_USER. See README CI/CD and the workflow run Summary."
          else
            echo "::notice title=E2E skipped::Add GM_USERNAME+GM_PASSWORD or VALID_USERNAME+VALID_PASSWORD."
          fi
          exit 0

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium (with OS deps)
        if: steps.gate.outputs.run == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Verify upload CSV in workspace
        if: steps.gate.outputs.run == 'true'
        run: |
          ls -la
          if [ ! -f "define_user (1).csv" ]; then
            echo "::error title=Missing CSV::Commit define_user (1).csv at repo root or set GM_UPLOAD_CSV to a checked-in path."
            exit 1
          fi

      - name: Run E2E tests
        if: steps.gate.outputs.run == 'true'
        env:
          CI: "true"
          MAILINATOR_DOMAIN: public
          S_GM_USER: ${{ secrets.GM_USERNAME }}
          S_GM_PASS: ${{ secrets.GM_PASSWORD }}
          S_VAL_USER: ${{ secrets.VALID_USERNAME }}
          S_VAL_PASS: ${{ secrets.VALID_PASSWORD }}
          S_OTP: ${{ secrets.GM_OTP_CODE }}
          S_GM_OTP_EMAIL: ${{ secrets.GM_OTP_EMAIL }}
          S_OTP_EMAIL: ${{ secrets.OTP_EMAIL }}
          S_IMAP_HOST: ${{ secrets.IMAP_HOST }}
          S_IMAP_USER: ${{ secrets.IMAP_USER }}
          S_IMAP_PASSWORD: ${{ secrets.IMAP_PASSWORD }}
          PLAYWRIGHT_TIMEOUT_MS: "120000"
          PLAYWRIGHT_NAVIGATION_TIMEOUT_MS: "120000"
        run: |
          trim() { printf '%s' "$1" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'; }
          export GM_USERNAME="$(trim "$S_GM_USER")"
          [ -z "$GM_USERNAME" ] && export GM_USERNAME="$(trim "$S_VAL_USER")"
          export GM_PASSWORD="$(trim "$S_GM_PASS")"
          [ -z "$GM_PASSWORD" ] && export GM_PASSWORD="$(trim "$S_VAL_PASS")"
          OTP_TRIM="$(trim "$S_OTP")"
          [ -n "$OTP_TRIM" ] && export GM_OTP_CODE="$OTP_TRIM"
          export GM_OTP_EMAIL="$(trim "$S_GM_OTP_EMAIL")"
          [ -z "$GM_OTP_EMAIL" ] && export GM_OTP_EMAIL="$(trim "$S_OTP_EMAIL")"
          IH="$(trim "$S_IMAP_HOST")"
          IU="$(trim "$S_IMAP_USER")"
          IP="$(trim "$S_IMAP_PASSWORD")"
          [ -n "$IH" ] && export IMAP_HOST="$IH"
          [ -n "$IU" ] && export IMAP_USER="$IU"
          [ -n "$IP" ] && export IMAP_PASSWORD="$IP"
          python -m pytest tests/ -v --alluredir=allure-results --tb=short

      - name: E2E passed — job summary
        if: success() && steps.gate.outputs.run == 'true'
        run: |
          echo "## Playwright E2E" >> "$GITHUB_STEP_SUMMARY"
          echo "All tests under \`tests/\` passed." >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Allure results on failure
        if: failure() && steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-gmmfaupload
          path: allure-results/
          if-no-files-found: ignore
